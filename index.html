<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="layout-wrapper">
        <aside class="panel-lateral">
            <h2>Configuración</h2>
            <div class="card-control">
                <p>Estado: <span id="estado-label">ACTIVO</span></p>
                <button id="btn-toggle" class="btn-danger">Desactivar Tablero</button>
            </div>
            
            <div class="card-control">
                <h3>Acciones de Datos</h3>
                <button id="btn-add" class="btn-secundario">Añadir Fila</button>
                <button id="btn-clear" class="btn-outline">Limpiar Consola</button>
            </div>
        </aside>

        <main class="contenedor-tablero">
            <header class="header-tablero">
                <h1>Tablero de Operaciones</h1>
                <input type="text" id="buscador" placeholder="Filtrar registros...">
            </header>

            <div id="tablero-interactivo" class="tablero-wrapper">
                <table id="tabla-principal">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Fecha</th>
                            <th>Usuario</th>
                            <th>Actividad</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

</body>
</html>
