<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 en Raya - Edición Limpia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class="main-title">3 EN RAYA</h1>

    <main id="contenedor-juego" class="main-container">
        <aside class="panel-lateral">
            <div id="menu-configuracion">
                <p class="etiqueta">MODO DE JUEGO</p>
                <select onchange="cambiarModo(this.value)" id="selector-modo" class="input-minimal">
                    <option value="1">👤 CONTRA IA</option>
                    <option value="2">👥 DOS JUGADORES</option>
                </select>

                <div id="selector-pieza" class="selector-pieza">
                    <p class="etiqueta">ELIGE TU PIEZA</p>
                    <div class="opciones-pieza">
                        <div class="pieza-btn activa" onclick="elegirPieza('cross', this)">
                            <img src="cross.svg" alt="Equis">
                        </div>
                        <div class="pieza-btn" onclick="elegirPieza('circle', this)">
                            <img src="circle.svg" alt="Círculo">
                        </div>
                    </div>
                </div>
                
                <div id="area-nombres" style="display:none; margin-top:20px;">
                    <input type="text" id="nombre-j1" placeholder="Nombre Jugador 1" class="input-minimal">
                    <input type="text" id="nombre-j2" placeholder="Nombre Jugador 2" class="input-minimal">
                </div>

                <button class="btn-inicio" onclick="confirmarInicio()">EMPEZAR PARTIDA</button>
            </div>

            <div id="marcador" class="marcador-panel">
                <div id="p1" class="tarjeta-jugador activa">
                    <div class="info-cabecera">
                        <img src="cross.svg" class="icono-min" id="img-p1">
                        <span id="txt-p1">Jugador 1</span>
                    </div>
                    <div class="puntos">Victorias: <span id="puntos-1">0</span></div>
                </div>
                <div class="divisor-vs">VS</div>
                <div id="p2" class="tarjeta-jugador">
                    <div class="info-cabecera">
                        <img src="circle.svg" class="icono-min" id="img-p2">
                        <span id="txt-p2">Bot Gemini</span>
                    </div>
                    <div class="puntos">Victorias: <span id="puntos-2">0</span></div>
                </div>
            </div>
        </aside>

        <section class="contenedor-tablero">
            <div class="tablero" id="tablero"></div>
            <div id="info-ronda" class="info-ronda"></div>
        </section>
    </main>

    <section id="resumen-final" class="vista-resumen" style="display:none;"></section>

    <div id="anuncio" class="overlay-anuncio">
        <p id="anuncio-texto"></p>
        <h2 id="anuncio-ganador"></h2>
    </div>

    <script src="index.js"></script>
</body>
</html>
