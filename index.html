<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 en Raya Premium</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class="main-title">3 EN RAYA</h1>

    <main id="game-container" class="main-container">
        <aside class="side-panel">
            <div id="setup-panel" class="config-flow">
                
                <div class="field-group">
                    <label class="section-label">MODO DE JUEGO</label>
                    <select onchange="cambiarModo(this.value)" id="multiplayer" class="big-input">
                        <option value="1">👤 VS IA GEMINI</option>
                        <option value="2">👥 DOS JUGADORES</option>
                    </select>
                </div>

                <div id="piece-selector" class="piece-selection-area">
                    <label class="section-label">ELIGE TU BANDO</label>
                    <div class="piece-cards">
                        <div class="piece-card active" onclick="seleccionarPieza('cross', this)">
                            <img src="cross.svg" class="card-icon">
                            <span>EQUIS</span>
                        </div>
                        <div class="piece-card" onclick="seleccionarPieza('circle', this)">
                            <img src="circle.svg" class="card-icon">
                            <span>CÍRCULO</span>
                        </div>
                    </div>
                </div>

                <div id="name-inputs" class="name-fields" style="display:none;">
                    <input type="text" id="n1" class="big-input" placeholder="Nombre Jugador 1">
                    <input type="text" id="n2" class="big-input" placeholder="Nombre Jugador 2">
                </div>

                <button class="mega-btn" onclick="confirmarInicio()">COMENZAR PARTIDA</button>
            </div>

            <div id="scoreboard" style="display:none;">
                <div id="p1" class="score-card active">
                    <div class="card-info">
                        <img src="cross.svg" id="icon-1" class="mini-icon">
                        <span id="name-1" class="name-display">Jugador 1</span>
                    </div>
                    <div class="win-count"><span id="wins-1">0</span> PTS</div>
                </div>
                <div class="vs-divider">VS</div>
                <div id="p2" class="score-card">
                    <div class="card-info">
                        <img src="circle.svg" id="icon-2" class="mini-icon">
                        <span id="name-2" class="name-display">IA</span>
                    </div>
                    <div class="win-count"><span id="wins-2">0</span> PTS</div>
                </div>
            </div>
        </aside>

        <section class="board-area">
            <div class="board" id="board"></div>
            <div id="round-info" class="round-badge"></div>
        </section>
    </main>

    <section id="final-summary" class="summary-view" style="display:none;"></section>

    <div id="toast" class="toast-overlay">
        <p id="toast-sub"></p>
        <h2 id="toast-main"></h2>
    </div>

    <script src="index.js"></script>
</body>
</html>
